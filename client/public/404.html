<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Adjoba Mushia Cobbold</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #f8fafc;
      color: #1e3a5f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 1.25rem;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(30,58,95,0.07);
    }

    .accent {
      height: 4px;
      background: linear-gradient(90deg, #1e3a5f, #3b82f6);
      border-radius: 4px 4px 0 0;
      margin: -3rem -2.5rem 2.5rem;
    }

    .code {
      font-size: 6rem;
      font-weight: 800;
      color: #1e3a5f;
      line-height: 1;
      letter-spacing: -4px;
      margin-bottom: 1rem;
    }

    .code span {
      color: #3b82f6;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.9rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      padding: 0.7rem 1.75rem;
      background: #1e3a5f;
      color: white;
      font-size: 0.875rem;
      font-weight: 600;
      border-radius: 0.5rem;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn:hover { background: #2a4f7f; }

    .footer {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="accent"></div>
    <div class="code">4<span>0</span>4</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or may have been moved. Head back to the portfolio and explore from there.</p>
    <a href="/" class="btn">Back to Portfolio</a>
  </div>
  <p class="footer">&copy; 2025 Adjoba Mushia Cobbold</p>
</body>
</html>
